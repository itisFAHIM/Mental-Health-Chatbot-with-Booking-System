{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGPT</title>
    <link rel="stylesheet" href="{% static 'chatbot/style.css' %}">
</head>
<body>
    <div id="history-sidebar" class="history-sidebar">
        <button id="new-chat-btn" class="new-chat-btn">New Chat</button>
        <hr style="border-color: #444; margin: 15px 0;">
        <div id="history-list-container">
            </div>
    </div>

    <main id="main-content" class="main-content">
        <div class="chat-container">

            <div class="chat-header">
                <button type="button" id="history-toggle-btn">☰</button>
                <h1>MindGPT</h1>

                <div class="header-buttons">
                    <a href="{% url 'landing_page' %}">
                        <button type="button" id="home-btn">Home</button>
                    </a>
                    <a href="{% url 'logout_view' %}">
                        <button type="button" id="logout-btn">Logout</button>
                    </a>
                </div>
            </div>

            <div id="chat-box" class="chat-box"></div>

            <form id="chat-form" class="chat-form">
                <textarea id="user-input" rows="2" placeholder="Type your message..."></textarea>
                <button type="submit">Send</button>
            </form>
        </div>
    </main>

    <script src="{% static 'chatbot/script.js' %}"></script>
</body>
</html>
