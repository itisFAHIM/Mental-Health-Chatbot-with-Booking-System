<!doctype html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — MH Chatbot</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <input id="username" placeholder="Username" autocomplete="username">
    <input id="password" placeholder="Password" type="password" autocomplete="current-password">
    <button id="login">Login</button>
    <p>Don't have an account? <a href="/signup/">Sign up</a></p>
  </div>
  <script>
  async function postJSON(url,data){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.json();}
  document.getElementById('login').addEventListener('click', async ()=>{
    const u=document.getElementById('username').value, p=document.getElementById('password').value;
    const res = await postJSON('/api/auth/login/', {username:u,password:p});
    if(res.token){ localStorage.setItem('token', res.token); window.location.href = '/'; } else { alert('Login failed'); }
  });
  </script>
</body></html>
