{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Pending - MindGPT</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; background: linear-gradient(135deg, #f0f7ff 0%, #e0f2ff 100%); color: #333; }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
            text-align: center;
        }
        .pending-box {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            max-width: 500px;
        }
        h1 {
            color: #007bff;
            margin-top: 0;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 500;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            display: inline-block;
            background-color: #007bff;
            color: white; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="pending-box">
            <h1>Your request has been sent!</h1>
            <p>Your appointment is waiting for confirmation from the doctor.</p>
            <p>This will take only 5 minutes. Else Call this number- <strong>017454530372</strong></p>
            <a href="{% url 'my_appointments' %}" class="btn">Check Status</a>
            <a href="{% url 'landing_page' %}" class="btn" style="background-color: #6c757d;">Go to Home</a>
        </div>
    </div>
</body>
</html>
