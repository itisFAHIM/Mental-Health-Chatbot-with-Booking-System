{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindGPT | Sign Up</title>
    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #3a6073, #3a7bd5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .signup-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 60px 50px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
            max-width: 90%;
        }

        h1 {
            font-size: 2.4em;
            margin-bottom: 10px;
        }

        p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
            font-size: 1em;
            outline: none;
            box-sizing: border-box; /* Fixes padding issue */
        }

        button {
            background: #fff;
            color: #3a6073;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            padding: 12px 40px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        button:hover {
            background: #eee;
            transform: scale(1.05);
        }

        a {
            color: #fff;
            text-decoration: underline;
            font-size: 0.9em;
            display: inline-block;
            margin-top: 15px;
        }

        a:hover {
            color: #cce3ff;
        }

        .error-message {
            color: #ffcccc;
            font-weight: 500;
            margin-top: -10px; /* Pull it up */
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>Create Account</h1>
        <p>Join MindGPT and start your self-care journey today.</p>

        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{% url 'signup_page' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="email" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Sign Up</button>
        </form>

        <a href="{% url 'login_page' %}">Already have an account? Login</a>
    </div>
</body>
</html>
